server {
    listen 80;
    server_name example.com;

    # Корень для статики и скриптов
    root /var/www/scripts;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.pl$ {
        # Передаем скрипт на Venti
        fastcgi_pass unix:/run/venti/venti.sock;

        # Стандартные параметры FastCGI
        include fastcgi_params;

        # Основной параметр - полный путь к скрипту
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        # Указываем, что Venti поддерживает keep-alive
        fastcgi_keep_conn on;

        # Отключаем буферизацию для потоковых ответов
        fastcgi_buffering off;

        # Таймауты
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }
}